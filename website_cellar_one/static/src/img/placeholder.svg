<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <rect width="300" height="400" fill="#f5f0eb"/>
  <defs>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C1A2E"/>
      <stop offset="50%" stop-color="#7A2340"/>
      <stop offset="100%" stop-color="#5C1A2E"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5A880"/>
      <stop offset="100%" stop-color="#9E8259"/>
    </linearGradient>
  </defs>
  <!-- Bottle shadow -->
  <ellipse cx="150" cy="370" rx="50" ry="8" fill="#00000010"/>
  <!-- Bottle body -->
  <path d="M115 180 L110 360 Q110 365 115 368 L185 368 Q190 365 190 360 L185 180 Z" fill="url(#bottleGrad)" opacity="0.85"/>
  <!-- Bottle shoulder -->
  <path d="M115 180 Q115 155 130 145 L135 130 L165 130 L170 145 Q185 155 185 180 Z" fill="url(#bottleGrad)" opacity="0.9"/>
  <!-- Neck -->
  <rect x="132" y="80" width="36" height="55" rx="2" fill="#7A2340" opacity="0.85"/>
  <!-- Lip -->
  <rect x="130" y="72" width="40" height="12" rx="3" fill="#5C1A2E"/>
  <rect x="134" y="72" width="32" height="3" rx="1" fill="#9E8259" opacity="0.6"/>
  <!-- Label -->
  <rect x="125" y="210" width="50" height="110" rx="4" fill="url(#labelGrad)"/>
  <!-- Label border -->
  <rect x="128" y="213" width="44" height="104" rx="3" fill="none" stroke="#FAF8F5" stroke-width="0.8" opacity="0.5"/>
  <!-- Label text line -->
  <line x1="135" y1="240" x2="165" y2="240" stroke="#FAF8F5" stroke-width="0.5" opacity="0.4"/>
  <line x1="138" y1="295" x2="162" y2="295" stroke="#FAF8F5" stroke-width="0.5" opacity="0.4"/>
  <!-- Label decorative star -->
  <polygon points="150,260 152,266 158,266 153,270 155,276 150,272 145,276 147,270 142,266 148,266" fill="#FAF8F5" opacity="0.6"/>
  <!-- Highlight reflection -->
  <rect x="125" y="82" width="8" height="275" rx="4" fill="#FFFFFF" opacity="0.06"/>
  <rect x="142" y="82" width="4" height="275" rx="2" fill="#FFFFFF" opacity="0.04"/>
  <!-- Cork -->
  <rect x="136" y="64" width="28" height="12" rx="2" fill="#D4A574"/>
  <rect x="136" y="64" width="28" height="3" rx="1" fill="#B8895C"/>
  <!-- Gold accent dots -->
  <circle cx="150" cy="200" r="2" fill="#C5A880" opacity="0.3"/>
  <circle cx="150" cy="330" r="2" fill="#C5A880" opacity="0.3"/>
  <!-- Decorative filigree -->
  <path d="M110 170 Q105 160 110 150" stroke="#C5A880" stroke-width="0.8" fill="none" opacity="0.15"/>
  <path d="M190 170 Q195 160 190 150" stroke="#C5A880" stroke-width="0.8" fill="none" opacity="0.15"/>
</svg>
